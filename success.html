<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevisVoice — Paiement réussi</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@400;500&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  width:100%;height:100%;
  background:#0d0d0d;color:#fff;
  font-family:'Inter',sans-serif;
  display:flex;align-items:center;justify-content:center;
  padding:24px;
}

.card{
  max-width:440px;width:100%;
  text-align:center;
}

.checkmark-wrap{
  width:90px;height:90px;
  border-radius:50%;
  background:rgba(34,197,94,.12);
  border:2px solid #22c55e;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 28px;
  animation:pop .5s cubic-bezier(.175,.885,.32,1.275) both;
}
@keyframes pop{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}

.checkmark{font-size:42px;animation:fadein .4s .3s both;}
@keyframes fadein{from{opacity:0;}to{opacity:1;}}

h1{
  font-family:'Syne',sans-serif;
  font-size:32px;font-weight:800;
  color:#fff;margin-bottom:12px;
}
.sub{
  font-size:16px;color:#888;
  margin-bottom:36px;line-height:1.5;
}

.spinner-wrap{
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-size:14px;color:#555;
}
.spinner{
  width:20px;height:20px;
  border:2px solid #2a2a2a;
  border-top-color:#FF4500;
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="card">

  <div class="checkmark-wrap">
    <span class="checkmark">✓</span>
  </div>

  <h1>Paiement réussi !</h1>
  <p class="sub">Configurons votre espace.</p>

  <div class="spinner-wrap">
    <div class="spinner"></div>
    <span>Préparation de votre compte...</span>
  </div>

</div>

<script>
'use strict';

const _h = window.location.hostname;
const BACKEND = (!_h || _h === 'localhost' || _h === '127.0.0.1')
  ? 'http://localhost:8080'
  : 'https://devisvoice-backend-production-9ed2.up.railway.app';

const _ue = localStorage.getItem('user_email') || '';
const _uk = _ue ? btoa(_ue).replace(/=/g,'') : '';
function lsSet(key, val){ localStorage.setItem(_uk ? _uk+'_'+key : key, val); }

const sessionId = new URLSearchParams(window.location.search).get('session_id');
if(sessionId) localStorage.setItem('stripe_session_id', sessionId);

async function init(){
  if(sessionId){
    try {
      const r = await fetch(BACKEND + '/api/stripe/session/' + sessionId);
      const data = await r.json();
      if(data.plan) lsSet('user_plan', data.plan);
    } catch(e) { /* non bloquant */ }
  }
  setTimeout(function(){
    window.location.href = 'onboarding-domaine.html';
  }, 2000);
}

init();
</script>
</body>
</html>
